version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: eurosia_postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: eurosia_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eurosia_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eurosia_defender_api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:secure_password@database:5432/eurosia_db?schema=public
      - JWT_ACCESS_SECRET=eurosia_access_secret_token_unlocked_9921_key
      - JWT_REFRESH_SECRET=eurosia_refresh_secret_token_revoked_7821_key
      - JWT_ACCESS_EXPIRED=15m
      - JWT_REFRESH_EXPIRED=7d
    depends_on:
      database:
        condition: service_healthy

volumes:
  postgres_data:
